<!DOCTYPE html>
<html>
<head>
    <title>Simple Table Website Layout</title>
</head>
<body bgcolor="#f0f0f0"> 


    <table border="1" width="80%"  align="center" cellpadding="10px" cellspacing="0">
        <tr align="center" bgcolor="#4CAF50">
            <td colspan="2"><h1>My Website</h1></td>
        </tr>
        <tr align="center" bgcolor="#dddddd">
            <td colspan="2">
                <a href="#">Home</a> | 
                <a href="#">Contact</a> | 
                <a href="#">About</a> | 
                <a href="#">Feedback</a>  
            </td>
        </tr>
        <tr height="400px" valign="top">
            <td bgcolor="#e6ffe6">
                <h1>Main content</h1>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Alias, dolorum.</p>
            </td>
            <td bgcolor="#ccffcc">
                <h3>Sidebar</h3>
                <p>Sidebar have Links</p>
            </td>
        </tr>
        <tr align="center" bgcolor="#4CAF50">
            <td colspan="2">
                <p>&copy; Copyright All Rights Reserved by The Providers</p>
            </td>
        </tr>

    </table>



</body>
</html>
