<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table tag in HTML</title>
</head>
<body>

        <table border="1" bgcolor="yellow" align="center"  width="80%" height="400px">
            <tr valign="bottom" bgcolor="red">
                <td>ID</td>
                <td>Name</td>
                <td>Email</td>
            </tr>
            <tr align="center">
                <td>1</td>
                <td>Ali</td>
                <td>ali@gmail.com</td>
            </tr>

        </table>
    
</body>
</html>
