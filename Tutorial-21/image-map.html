<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Map in HTML </title>
</head>
<body>

        <img src="workplace.jpg" usemap="#mymap" alt="">
    
        <map name="mymap">
            <area shape="rect" coords="34,44,269,344" href="https://www.theproviders.tech/" target="_blank" title="The Providers Website" alt="">
            <area shape="circle" coords="333,299,40" href="https://www.theproviders.tech/" title="Circle shape" alt="">
            <area shape="default" coords="" href="#" title="defualt" alt="">
            <area target="" alt="" title="Poly Shape" href="#" coords="335,29,278,116,357,171,389,104" shape="poly">

        </map>
        
</body>
</html>
