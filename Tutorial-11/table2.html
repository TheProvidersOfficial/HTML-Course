<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag with attributes in HTML</title>
</head>
<body>
        
        <table border="1" width="60%" height="300px" cellpadding="20px" cellspacing="5px" >
            <tr >
                <td colspan="2">A Cell</td>
               
            </tr>
            <tr>
                <td rowspan="2">C Cell</td>
                <td>D Cell</td>
            </tr>
            <tr>
                
                <td>F Cell</td>
            </tr>
        </table>
    
</body>
</html>
