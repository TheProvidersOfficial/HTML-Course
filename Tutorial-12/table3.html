<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag with all attributes in HTML</title>
</head>
<body>

    <table border="1" width="60%" height="300px" cellpadding="10px" cellspacing="5px">
        <thead bgcolor="red">
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody bgcolor="blue">

        
        <tr>
            <td>1</td>
            <td>Bread</td>
            <td>100</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Eggs</td>
            <td>50</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Cover</td>
            <td>500</td>
        </tr>
        <tr>
            <td>4</td>
            <td>Mouse</td>
            <td>600</td>
        </tr>
        </tbody>
        <tfoot bgcolor="brown">
            <tr>
                <td colspan="2">Total</td>
                <td>1250</td>
            </tr>
        </tfoot>

    </table>
    
</body>
</html>
