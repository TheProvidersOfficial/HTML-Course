<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Input Types Practice The Providers</title>
</head>
<body>

<h1>HTML Input Types - Practice File (Part 2)</h1>

<form action="#" method="post">

<h3>Basic Input Types</h3>

<label>Search:</label><br>
<input type="search" placeholder="Search here"><br><br>

<label>Color Picker:</label><br>
<input type="color"><br><br>

<label>Date:</label><br>
<input type="date"><br><br>

<label>Date & Time:</label><br>
<input type="datetime-local"><br><br>

<label>Number (1 to 10):</label><br>
<input type="number" min="1" max="10" value="5"><br><br>

<label>Month:</label><br>
<input type="month"><br><br>

<label>Range (0 to 100):</label><br>
<input type="range" min="0" max="100"><br><br>

<label>Time:</label><br>
<input type="time"><br><br>

<h3>Text Validation</h3>

<label>Username (min 3, max 10):</label><br>
<input type="text" minlength="3" maxlength="10" required><br><br>

<h3>File Upload</h3>

<label>Select File:</label><br>
<input type="file"><br><br>

<label>Only Images:</label><br>
<input type="file" accept="image/*"><br><br>

<label>Multiple Files:</label><br>
<input type="file" multiple><br><br>

<h3>Hidden Field</h3>

<input type="hidden" name="userid" value="12345">

<h3>Buttons</h3>

<input type="submit" value="Submit Form">
<input type="reset" value="Reset Form">
<input type="button" value="Click Me"><br><br>

<h3>Disabled Field</h3>

<input type="text" value="Disabled Input" disabled>

</form>

</body>
</html>
